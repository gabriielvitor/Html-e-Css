<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner {
            background-color: lightcoral;

            display: flex;
            flex-flow: row wrap;
            /* flex-direction: row;
            flex-wrap: nowrap; */
        }

        div.item {
            text-align: center;
            background-color: lightblue;
            border: 1px dotted black;

            flex: auto;
        }


    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item">Exemplo de bloco flex A</div>
        <div class="item">Exemplo de bloco flex B</div>
        <div class="item">Exemplo de bloco flex C</div>
        <div class="item">Exemplo de bloco flex D</div>
        <div class="item">Exemplo de bloco flex E</div>
        <div class="item">Exemplo de bloco flex F</div>
        <div class="item">Exemplo de bloco flex G</div>
        <div class="item">Exemplo de bloco flex H</div>
    </div>
</body>
</html>
