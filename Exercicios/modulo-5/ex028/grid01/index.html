<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout na prática</title>

    <style>
        div.container {
            border: 3px solid blue;
            height: 250px;
            display: grid;
            
            /*
            grid-template-columns: auto auto auto;
            grid-template-rows: auto auto auto;
            */
            grid-template: repeat(3, auto) /* Row *// repeat(3, auto) /* Column */;

            gap: 10px;

            /*
            align-items: normal;  Vertical 
            justify-items: normal;  Horizontal 
            */
            place-items: normal normal; /* Align Justify*/

            /*
            align-content: normal;  Conteudo inteiro vertical
            justify-content: normal;  Conteudo inteiro horizontal 
            */
            place-content: normal normal; /* Align Justify*/

        }

        div.item {
            text-align: center;
            border: 3px solid red;
            padding: 5px;
        }

    </style>

</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">G</div>
        <div class="item">H</div>
    </div>
</body>
</html>
